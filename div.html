<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div Tag</title>
</head>
<body>
    <!-- Block Level Element-span,a,img,u,sub,sup -->
    <div>Hello</div>
    <div>Hi</div>
    <p>Hello</p>
    <p>Hi</p>
    <!-- Inline Element-span,a,img,u,sub,sup -->
    <span>Hello</span>
    <span>Hi</span>
    <p>Feb Batch student are very<span style="color: brown;">Knowledgeble</span></p>
</body>
</html>
